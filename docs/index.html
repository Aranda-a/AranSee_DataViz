<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AranSee_DataViz</title>
  <style>
    :root { --bg: #fafafa; --fg: #1a1a1a; --muted: #5a5a5a; --accent: #3d7a3a; --border: #e6e6e6; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--fg); line-height: 1.6;
    }
    .lang-bar {
      position: fixed; top: 12px; right: 12px; z-index: 10;
      display: flex; gap: 6px;
    }
    .lang-bar button {
      padding: 5px 11px; font-size: 12px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--border); background: #fff; color: var(--fg);
    }
    .lang-bar button.active { background: #eef6ec; border-color: var(--accent); color: var(--accent); }
    main { max-width: 42rem; margin: 0 auto; padding: 3rem 1.25rem 4rem; }
    h1 { font-size: 1.75rem; margin: 0 0 1rem; }
    .ip { display: flex; justify-content: center; margin: 0 0 1.25rem; }
    .ip img { width: 132px; height: auto; }
    p { margin: 0 0 1rem; color: var(--muted); }
    p.lead { color: var(--fg); }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 1.5rem 0; }
    .actions a {
      padding: 10px 14px; border-radius: 10px; text-decoration: none;
      border: 1px solid var(--border); color: var(--fg); background: #fff;
    }
    .actions a.primary { border-color: var(--accent); color: var(--accent); }
    .foot { font-size: 0.875rem; color: var(--muted); margin-top: 2rem; }
    .foot a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="lang-bar" aria-label="Language">
    <button type="button" data-lang="zh" class="active">中</button>
    <button type="button" data-lang="en">EN</button>
  </div>
  <main>
    <div class="ip">
      <img src="brand/googo_ip_static.svg" width="132" alt="Googo" />
    </div>
    <h1 data-i18n="title">AranSee_DataViz</h1>
    <p class="lead" data-i18n="lead1">AranSee 是面向创作者的 AI 内容诊断产品：帖文与评论场 → X/Y/Z 三轴判断，2.5D 沙盘让落位可见。</p>
    <p data-i18n="lead2">在 Cursor 以 Skill 安装——AI 读懂打分，沙盘呈现模拟。</p>
    <div class="actions">
      <a class="primary" href="demos/folk_daoxi_series_01/aransee_sandbox.html" data-i18n="demo">打开系列双锚沙盘</a>
      <a href="demos/" data-i18n="hub">展示首页</a>
      <a href="brand/ip-mark.html" data-i18n="ip">Googo 交互 IP</a>
      <a href="https://github.com/Aranda-a/AranSee_DataViz" data-i18n="repo">GitHub 仓库</a>
    </div>
    <p class="foot"><span data-i18n="readme">完整说明见</span> <a href="https://github.com/Aranda-a/AranSee_DataViz#readme">README</a></p>
  </main>
  <script>
    const I18N = {
      zh: {
        title: 'AranSee_DataViz',
        lead1: 'AranSee 是面向创作者的 AI 内容诊断产品：帖文与评论场 → X/Y/Z 三轴判断，2.5D 沙盘让落位可见。',
        lead2: '在 Cursor 以 Skill 安装——AI 读懂打分，沙盘呈现模拟。',
        demo: '打开系列双锚沙盘',
        hub: '展示首页',
        ip: 'Googo 交互 IP',
        repo: 'GitHub 仓库',
        readme: '完整说明见',
      },
      en: {
        title: 'AranSee_DataViz',
        lead1: 'AranSee is an AI content diagnosis product for creators: posts + comment field → X/Y/Z scores, shown in a 2.5D sandbox.',
        lead2: 'Install as a Cursor Skill — AI reads and scores; the sandbox presents and simulates.',
        demo: 'Open series dual-anchor sandbox',
        hub: 'Demo hub',
        ip: 'Googo interactive IP',
        repo: 'GitHub repo',
        readme: 'Full docs:',
      },
    };
    function applyLang(lang) {
      const pack = I18N[lang] || I18N.zh;
      document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
      document.title = pack.title;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (pack[key]) el.textContent = pack[key];
      });
      document.querySelectorAll('.lang-bar button').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      try { localStorage.setItem('aransee-lang', lang); } catch (_) {}
    }
    document.querySelectorAll('.lang-bar button').forEach((btn) => {
      btn.addEventListener('click', () => applyLang(btn.dataset.lang));
    });
    const saved = (() => { try { return localStorage.getItem('aransee-lang'); } catch (_) { return null; } })();
    applyLang(saved === 'en' ? 'en' : 'zh');
  </script>
</body>
</html>
