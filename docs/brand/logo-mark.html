<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AranSee · Logo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --logo-color: #8BCF6A; }
        .googo-ip { pointer-events: auto; }
        .googo-ip {
            display: flex; flex-direction: column; align-items: center;
            user-select: none; background: transparent; overflow: visible;
        }
        .googo-ip svg.ip-svg { display: block; height: auto; pointer-events: auto; overflow: visible; }
        .googo-ip.corner svg.ip-svg { width: 132px; }
        .googo-ip.gate svg.ip-svg { width: min(260px, 52vw); }
        .googo-ip { --ip-bounce-plane: 82.2%; --ip-bounce-amp: 9px; --ip-bounce-delay-hair: 0.16s; --ip-bounce-delay-nose: 0.24s; }
        .googo-ip.gate { --ip-bounce-amp: 20px; }
        .googo-ip [data-ip-part^="iris"] {
            transform-box: fill-box; transform-origin: center; will-change: transform;
        }
        .googo-ip .ip-hit { cursor: default; pointer-events: all; touch-action: manipulation; }
        .googo-ip #ip-micro-hits { pointer-events: none; }
        @keyframes ip-idle-bounce {
            0%, 100% { transform: translateY(0); }
            28% { transform: translateY(calc(-1 * var(--ip-bounce-amp))); }
            52% { transform: translateY(calc(0.22 * var(--ip-bounce-amp))); }
            72% { transform: translateY(calc(-0.1 * var(--ip-bounce-amp))); }
        }
        .googo-ip .ip-idle-body {
            transform-box: view-box;
            transform-origin: 50% var(--ip-bounce-plane);
            animation: ip-idle-bounce 2.6s cubic-bezier(0.42, 0, 0.58, 1) infinite;
        }
        .googo-ip .ip-idle-hair {
            transform-box: view-box;
            transform-origin: 50% var(--ip-bounce-plane);
            animation: ip-idle-bounce 2.6s cubic-bezier(0.42, 0, 0.58, 1) infinite;
            animation-delay: var(--ip-bounce-delay-hair);
        }
        .googo-ip .ip-idle-nose {
            transform-box: view-box;
            transform-origin: 50% var(--ip-bounce-plane);
            animation: ip-idle-bounce 2.85s cubic-bezier(0.38, 0.04, 0.62, 0.96) infinite;
            animation-delay: var(--ip-bounce-delay-nose);
        }
        .googo-ip #ip-nose {
            transform-box: view-box;
            transform-origin: 50% var(--ip-bounce-plane);
        }
        .googo-ip #ip-nose.ip-nose-falling {
            animation: none !important;
            transition: transform 0.58s cubic-bezier(0.55, 0.06, 0.68, 0.53);
        }
        .googo-ip #ip-nose.ip-nose-restoring {
            animation: none !important;
            transition: transform 0.48s cubic-bezier(0.34, 1.25, 0.64, 1);
        }
        .googo-ip #ip-wordmark {
            transform-box: fill-box;
            transform-origin: 50% 100%;
        }
        @keyframes ip-wordmark-impact {
            0% { transform: translate(0, 0); }
            28% { transform: translate(var(--ip-hit-x, 0px), var(--ip-hit-y, 4px)); }
            52% { transform: translate(calc(var(--ip-hit-x, 0px) * -0.35), calc(var(--ip-hit-y, 4px) * -0.45)); }
            76% { transform: translate(calc(var(--ip-hit-x, 0px) * 0.12), calc(var(--ip-hit-y, 4px) * 0.1)); }
            100% { transform: translate(0, 0); }
        }
        .googo-ip #ip-wordmark.ip-wordmark-hit {
            animation: ip-wordmark-impact 0.52s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
        .googo-ip #ip-bridge {
            transform-box: fill-box;
            transform-origin: 50% 100%;
        }
        @keyframes ip-bridge-bump {
            0% { transform: translateY(0); }
            32% { transform: translateY(calc(-1 * var(--ip-bridge-lift, 6px))); }
            58% { transform: translateY(calc(var(--ip-bridge-lift, 6px) * 0.2)); }
            100% { transform: translateY(0); }
        }
        .googo-ip #ip-bridge.ip-bridge-hit {
            animation: ip-bridge-bump 0.4s cubic-bezier(0.34, 1.35, 0.64, 1);
        }
        .googo-ip #ip-eyes-front [data-ip-part="eye-l"],
        .googo-ip #ip-eyes-front [data-ip-part="eye-r"] {
            transform-box: fill-box;
            transform-origin: center;
            transition: none;
        }
        .googo-ip #ip-eyes-front [data-ip-part="eye-l"].ip-micro-on,
        .googo-ip #ip-eyes-front [data-ip-part="eye-r"].ip-micro-on {
            transform: scale(2);
        }
        .googo-ip #ip-arm-r-ball {
            transform-box: fill-box;
            transform-origin: center;
            transition: none;
        }
        .googo-ip #ip-arm-r-ball.ip-micro-on {
            transform: scale(2);
        }
        .googo-ip #ip-arm-r-ball.ip-impact-on {
            transform: scale(2.08);
            fill: var(--logo-color) !important;
            filter: drop-shadow(0 0 4px rgba(120,255,150,0.82))
                drop-shadow(0 0 10px rgba(120,255,150,0.56));
        }
        [data-theme="light"] .googo-ip #ip-arm-r-ball.ip-impact-on {
            fill: #55FF26 !important;
            filter: drop-shadow(0 0 5px rgba(85,255,38,0.9))
                drop-shadow(0 0 12px rgba(85,255,38,0.55));
        }
        .googo-ip #ip-arm-l-main {
            transform-box: view-box;
            transform-origin: 39px 173px;
            transition: transform 0.28s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
        @keyframes ip-arm-l-swing {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }
        .googo-ip #ip-arm-l-main.ip-micro-on {
            animation: ip-arm-l-swing 0.75s ease-in-out infinite;
            transition: none;
        }
        @media (prefers-reduced-motion: reduce) {
            .googo-ip .ip-idle-body,
            .googo-ip .ip-idle-hair,
            .googo-ip .ip-idle-nose {
                animation: none !important;
            }
            .googo-ip .ip-micro-on {
                animation: none !important;
                transform: none !important;
            }
            .googo-ip #ip-nose.ip-nose-falling,
            .googo-ip #ip-nose.ip-nose-restoring,
            .googo-ip #ip-wordmark.ip-wordmark-hit,
            .googo-ip #ip-bridge.ip-bridge-hit {
                animation: none !important;
                transition: none !important;
                transform: none !important;
            }
        }
        [data-theme="dark"] .googo-ip #ip-wordmark { fill: #8BCF6A; }
        .gate-logo {
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; overflow: visible;
        }
        .gate-logo .googo-ip { pointer-events: auto; }
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center;
            justify-content: center; background: transparent;
        }
        [data-theme="light"] .googo-ip #ip-wordmark { fill: #234433; }

    </style>
</head>

    <script>
        const LOGO_EYE_TRACKS = [];

        function initLogoEyeTracks() {
            LOGO_EYE_TRACKS.length = 0;
            document.querySelectorAll('[data-logo-track]').forEach(logo => {
                [['iris-l', 'eye-l'], ['iris-r', 'eye-r']].forEach(([irisPart, eyePart]) => {
                    const iris = logo.querySelector('[data-ip-part="' + irisPart + '"]');
                    const eye = logo.querySelector('[data-ip-part="' + eyePart + '"]');
                    if (iris && eye) LOGO_EYE_TRACKS.push({ iris, eye });
                });
            });
        }

        function initLogoBouncePlane() {
            document.querySelectorAll('[data-logo-track]').forEach(logo => {
                const wm = logo.querySelector('#ip-wordmark');
                if (!wm) return;
                const vb = wm.ownerSVGElement?.viewBox?.baseVal;
                const vh = vb && vb.height ? vb.height : 500;
                const top = wm.getBBox().y - 2;
                logo.style.setProperty('--ip-bounce-plane', ((top / vh) * 100).toFixed(2) + '%');
            });
        }

        function logoMicroTarget(logo, part) {
            if (part === 'eye-l' || part === 'eye-r') {
                return logo.querySelector('#ip-eyes-front [data-ip-part="' + part + '"]')
                    || logo.querySelector('[data-ip-part="' + part + '"]');
            }
            if (part === 'arm-r-ball') return logo.querySelector('#ip-arm-r-ball');
            if (part === 'arm-l') return logo.querySelector('#ip-arm-l-main');
            return logo.querySelector('[data-ip-part="' + part + '"]');
        }

        function setLogoMicro(logo, part, active) {
            const target = logoMicroTarget(logo, part);
            if (!target) return;
            target.classList.toggle('ip-micro-on', active);
            if (part === 'arm-r-ball') target.classList.toggle('ip-impact-on', active);
        }

        function bindLogoPointerHit(el, onEnter, onLeave) {
            el.addEventListener('pointerenter', onEnter);
            el.addEventListener('pointerleave', onLeave);
            el.addEventListener('pointerdown', (ev) => {
                if (ev.pointerType === 'touch') onEnter();
            });
            el.addEventListener('pointerup', (ev) => {
                if (ev.pointerType === 'touch') onLeave();
            });
            el.addEventListener('pointercancel', (ev) => {
                if (ev.pointerType === 'touch') onLeave();
            });
        }

        function initLogoMicro() {
            document.querySelectorAll('[data-logo-track]').forEach(logo => {
                if (logo.dataset.microReady) return;
                logo.dataset.microReady = '1';
                logo.querySelectorAll('.ip-hit').forEach(hit => {
                    const part = hit.getAttribute('data-ip-hit');
                    if (!part || part === 'nose') return;
                    bindLogoPointerHit(
                        hit,
                        () => setLogoMicro(logo, part, true),
                        () => setLogoMicro(logo, part, false)
                    );
                });
            });
        }

        function logoNoseTranslateY(nose) {
            const t = getComputedStyle(nose).transform;
            if (!t || t === 'none') return 0;
            return new DOMMatrixReadOnly(t).m42;
        }

        function logoNoseFallGap(nose, wordmark) {
            const nr = nose.getBoundingClientRect();
            const wr = wordmark.getBoundingClientRect();
            return Math.max(0, wr.top - nr.bottom + 2);
        }

        function logoNoseBridgeTouchPx(nose, bridge) {
            const nr = nose.getBoundingClientRect();
            const br = bridge.getBoundingClientRect();
            return Math.max(0, nr.top - br.bottom + 1);
        }

        function logoBridgeImpact(bridge, touchPx) {
            const lift = Math.min(9, Math.max(4.5, touchPx * 0.45 + 5));
            bridge.style.setProperty('--ip-bridge-lift', lift.toFixed(2) + 'px');
            bridge.classList.remove('ip-bridge-hit');
            void bridge.offsetWidth;
            bridge.classList.add('ip-bridge-hit');
        }

        function logoWordmarkImpact(wordmark, fallPx) {
            const bump = Math.min(7, Math.max(2.5, fallPx * 0.08));
            wordmark.style.setProperty('--ip-hit-y', bump.toFixed(2) + 'px');
            wordmark.style.setProperty('--ip-hit-x', (Math.random() * 2 - 1).toFixed(2) + 'px');
            wordmark.classList.remove('ip-wordmark-hit');
            void wordmark.offsetWidth;
            wordmark.classList.add('ip-wordmark-hit');
        }

        function initLogoNoseFall() {
            document.querySelectorAll('[data-logo-track]').forEach(logo => {
                if (logo.dataset.noseReady) return;
                logo.dataset.noseReady = '1';
                const nose = logo.querySelector('#ip-nose');
                const wordmark = logo.querySelector('#ip-wordmark');
                const bridge = logo.querySelector('#ip-bridge');
                const hit = logo.querySelector('.ip-hit[data-ip-hit="nose"]');
                if (!nose || !wordmark || !bridge || !hit) return;

                let impactTimer = null;
                let bumpTimer = null;

                function clearNoseInline() {
                    nose.classList.remove('ip-nose-falling', 'ip-nose-restoring');
                    nose.style.removeProperty('animation');
                    nose.style.removeProperty('transition');
                    nose.style.removeProperty('transform');
                }

                function restoreNose() {
                    if (impactTimer) { clearTimeout(impactTimer); impactTimer = null; }
                    if (bumpTimer) { clearTimeout(bumpTimer); bumpTimer = null; }
                    wordmark.classList.remove('ip-wordmark-hit');
                    bridge.classList.remove('ip-bridge-hit');
                    nose.classList.remove('ip-nose-falling');
                    nose.classList.add('ip-nose-restoring');
                    nose.style.transform = 'translate(0px, 0px)';
                    const onDone = (ev) => {
                        if (ev.propertyName !== 'transform') return;
                        nose.removeEventListener('transitionend', onDone);
                        clearNoseInline();
                    };
                    nose.addEventListener('transitionend', onDone);
                }

                function startNoseFallToWordmark(startY, fallPx) {
                    nose.style.transition = 'transform 0.58s cubic-bezier(0.55, 0.06, 0.68, 0.53)';
                    nose.style.transform = 'translate(0px, ' + (startY + fallPx) + 'px)';
                    if (impactTimer) clearTimeout(impactTimer);
                    impactTimer = setTimeout(() => logoWordmarkImpact(wordmark, fallPx), 560);
                }

                function triggerNoseFall() {
                    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                    const startY = logoNoseTranslateY(nose);
                    const fallPx = logoNoseFallGap(nose, wordmark);
                    const touchPx = logoNoseBridgeTouchPx(nose, bridge);
                    nose.classList.remove('ip-nose-restoring');
                    nose.style.animation = 'none';
                    nose.style.transform = 'translate(0px, ' + startY + 'px)';
                    nose.classList.add('ip-nose-falling');
                    if (bumpTimer) clearTimeout(bumpTimer);
                    if (impactTimer) clearTimeout(impactTimer);
                    if (touchPx <= 0.5) {
                        logoBridgeImpact(bridge, 2);
                        requestAnimationFrame(() => startNoseFallToWordmark(startY, fallPx));
                        return;
                    }
                    nose.style.transition = 'transform 0.15s cubic-bezier(0.34, 1.15, 0.64, 1)';
                    requestAnimationFrame(() => {
                        nose.style.transform = 'translate(0px, ' + (startY - touchPx) + 'px)';
                    });
                    bumpTimer = setTimeout(() => {
                        bumpTimer = null;
                        logoBridgeImpact(bridge, touchPx);
                        startNoseFallToWordmark(startY, fallPx);
                    }, 155);
                }

                bindLogoPointerHit(hit, triggerNoseFall, restoreNose);
            });
        }

        function trackLogoEyes(clientX, clientY) {
            if (!LOGO_EYE_TRACKS.length) initLogoEyeTracks();
            LOGO_EYE_TRACKS.forEach(({ iris, eye }) => {
                const er = eye.getBoundingClientRect();
                const ir = iris.getBoundingClientRect();
                if (!er.width || !ir.width) return;
                const cx = er.left + er.width / 2;
                const cy = er.top + er.height / 2;
                const dx = clientX - cx;
                const dy = clientY - cy;
                const slack = Math.max(0, er.width - ir.width);
                const maxPx = Math.max(5, slack * 0.45);
                const dist = Math.min(Math.hypot(dx, dy), maxPx);
                const ang = Math.atan2(dy, dx);
                const tx = Math.cos(ang) * dist;
                const ty = Math.sin(ang) * dist;
                iris.style.transform = 'translate(' + tx + 'px,' + ty + 'px)';
            });
        }

        initLogoEyeTracks();
        initLogoBouncePlane();
        initLogoMicro();
        initLogoNoseFall();
        document.addEventListener('mousemove', e => trackLogoEyes(e.clientX, e.clientY));
        document.addEventListener('pointermove', e => trackLogoEyes(e.clientX, e.clientY));
        trackLogoEyes(innerWidth / 2, innerHeight / 2);
</script>
</body>
